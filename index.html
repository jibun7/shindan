<style>
:root{
  --bg:#f4f3ef; --card:#ffffff; --ink:#2b2b33; --sub:#6f6f7a;
  --line:#e7e5df; --accent:#6b5bd6; --accent2:#39b9c7;
  --good:#3aa67a; --mid:#c39a36; --low:#b27272;
  --shadow:0 10px 40px rgba(40,38,70,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  background:linear-gradient(180deg,#efeef4 0%,#f4f3ef 40%);
  color:var(--ink); line-height:1.95; letter-spacing:.02em;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:600px;margin:0 auto;padding:28px 20px 80px}
.screen{display:none;animation:fade .5s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:32px 26px;margin-bottom:18px}
.eyebrow{font-size:12px;letter-spacing:.28em;color:var(--accent);text-align:center;font-weight:700;margin-bottom:14px}
h1{font-size:25px;line-height:1.5;text-align:center;margin:.2em 0 .1em;font-weight:800}
.lead{color:var(--sub);text-align:center;font-size:14.5px;margin:14px 0 4px}
.meta{color:var(--sub);text-align:center;font-size:12.5px;margin-top:18px}
.btn{display:block;width:100%;border:none;cursor:pointer;font:inherit;
  background:linear-gradient(135deg,var(--accent),#7d6fe0);color:#fff;
  padding:17px;border-radius:15px;font-size:16px;font-weight:700;letter-spacing:.06em;
  box-shadow:0 8px 22px rgba(107,91,214,.32);transition:transform .15s,box-shadow .15s;margin-top:8px}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:#fff;color:var(--accent);border:1.5px solid #ddd9f0;box-shadow:none}
.btn.line{background:linear-gradient(135deg,#06c755,#04b14c);box-shadow:0 8px 22px rgba(6,199,85,.28)}
.btn.x{background:#16161a;box-shadow:0 8px 22px rgba(0,0,0,.25)}
.opt{display:flex;align-items:center;width:100%;text-align:left;background:#fafafa;border:1.5px solid var(--line);
  border-radius:14px;padding:15px 18px;margin:9px 0;font:inherit;font-size:15.5px;cursor:pointer;
  transition:all .15s;color:var(--ink)}
.opt:hover{border-color:#c8c1ee;background:#f6f4ff}
.opt.sel{border-color:var(--accent);background:#f0edff;box-shadow:0 4px 14px rgba(107,91,214,.18)}
.opt .n{width:26px;height:26px;border-radius:50%;background:#eceaf6;color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-right:13px;flex-shrink:0}
.opt.sel .n{background:var(--accent);color:#fff}
.qhead{font-size:13px;color:var(--sub);text-align:center;margin-bottom:6px}
.qtext{font-size:18px;line-height:1.7;font-weight:700;margin:10px 0 22px;min-height:3.4em;display:flex;align-items:center}
.progress{height:6px;background:#e7e5df;border-radius:6px;overflow:hidden;margin-bottom:8px}
.progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}
.pcount{font-size:12px;color:var(--sub);text-align:right;margin-bottom:18px}
.grp{margin-bottom:26px}
.grp h3{font-size:14.5px;margin:0 0 10px;font-weight:700}
/* result */
.result-name{text-align:center}
.you{color:var(--sub);font-size:14px;letter-spacing:.2em}
.cname{font-size:27px;font-weight:800;line-height:1.45;margin:8px 0 6px;
  background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.subcatch{color:var(--ink);font-size:15px;font-weight:600;opacity:.85}
.bar-wrap{margin:26px 0 6px}
.bar-label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--sub);margin-bottom:7px;letter-spacing:.06em}
.bar{height:16px;border-radius:10px;background:#eceae3;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.08)}
.bar>i{display:block;height:100%;width:0;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s ease}
.bigpct{text-align:center;font-size:40px;font-weight:800;margin:14px 0 2px;letter-spacing:.02em}
.bigpct small{font-size:16px;font-weight:700;color:var(--sub)}
.axes{margin-top:22px;border-top:1px solid var(--line);padding-top:18px}
.axis{display:flex;align-items:center;margin:14px 0}
.axis .lab{width:118px;font-size:13.5px;font-weight:600;flex-shrink:0}
.axis .mk{width:30px;text-align:center;font-size:20px;font-weight:800;flex-shrink:0}
.axis .mini{flex:1;height:10px;border-radius:8px;background:#eceae3;overflow:hidden;margin:0 10px}
.axis .mini>i{display:block;height:100%;width:0;border-radius:8px;transition:width 1s ease}
.axis .pc{width:46px;text-align:right;font-size:13.5px;font-weight:700;flex-shrink:0}
.mk.good{color:var(--good)} .mk.mid{color:var(--mid)} .mk.low{color:var(--low)}
.body p{white-space:pre-wrap;margin:0 0 1em;font-size:15px}
.sectitle{font-size:12px;letter-spacing:.22em;color:var(--accent);font-weight:700;text-align:center;
  margin:30px 0 4px;text-transform:uppercase}
.divider{height:1px;background:var(--line);margin:22px 0}
.subhead{font-size:15px;font-weight:700;margin:22px 0 8px;color:var(--ink)}
.note{font-size:13px;color:var(--sub);background:#faf9f6;border:1px solid var(--line);border-radius:12px;padding:14px;white-space:pre-wrap}
.cta-block{border:1px solid var(--line);border-radius:16px;padding:20px;margin:14px 0;background:#fcfcfb}
.cta-block h4{margin:0 0 4px;font-size:16px;font-weight:800}
.cta-block .tag{font-size:12px;color:var(--accent);font-weight:700}
.cta-block p{white-space:pre-wrap;font-size:14px;color:#41414c;margin:10px 0 14px}
.share-row{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.share-row .btn{flex:1;min-width:130px;margin-top:0;font-size:14px;padding:14px}
#cardCanvas{width:100%;border-radius:16px;box-shadow:var(--shadow);margin:6px 0 12px;display:none}
.closing{text-align:center;color:var(--sub);font-size:13.5px;white-space:pre-wrap;margin:26px 0 4px}
.restart{text-align:center;margin-top:22px}
.restart a{color:var(--accent);font-size:13px;text-decoration:none;border-bottom:1px solid #d8d3f0;cursor:pointer}
.diff{display:inline-block;font-size:12.5px;font-weight:700;padding:2px 9px;border-radius:20px;margin-left:8px;vertical-align:middle}
.diff.up{background:#e6f6ee;color:var(--good)} .diff.down{background:#fbeeee;color:var(--low)} .diff.same{background:#f0eef6;color:var(--sub)}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#26262e;color:#fff;
  padding:12px 22px;border-radius:30px;font-size:13.5px;opacity:0;transition:all .3s;pointer-events:none;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

次元への入口が待っています。"}}, "layer2": [{"type": "h", "text": "「自分7.0」という考え方について"}, {"type": "p", "text": "私たちは普段、3次元の世界に没入しています。\n仕事、人間関係、社会の評価。\n気がつくと、それに流されている。\n\n「自分7.0」は、\nそんな自分を一段上から見る視点を持ち、\n自分自身をアップデートしていく試みです。\n\n最初の一歩は、4次元思考。\n3次元に没入している自分を、客観視できる視点。\n\n「あ、今の自分、こう感じてるんだ」\n「これは本音じゃなくて、流されてただけかも」\n\nそう気づけるようになります。"}, {"type": "h", "text": "アップデート%が示すもの"}, {"type": "p", "text": "診断テストの%は、\n4次元思考の獲得度合いを示しています。\n\n自己認識力      = 自分を見る力\n感情コントロール = 感情に飲まれない力\n自己受容        = 自分に優しくする力\n\nこの3つが、4次元思考の3本柱です。"}, {"type": "h", "text": "アップデートの先で、何が起きるのか"}, {"type": "p", "text": "4次元思考が身につくと、\n\n・本当の自分の感覚を、自覚できる\n・心の本音に、気づけるようになる\n・周りに流されず、自分の道を歩める\n・なぜか、物事が不思議と順調にまわりはじめる\n\nそんな状態に、少しずつ近づいていく気がします。\n\n脳科学(前頭前野の活性化、DMNの落ち着き)と、\n心理学・哲学の体系でも、ある程度は説明できる現象です。"}, {"type": "h", "text": "なぜ、それが可能なのか"}, {"type": "p", "text": "私自身、うつ病を経験して、\nそこから抜け出したくて\n心理学・哲学・自己啓発・スピリチュアル・宗教\n── 5つの領域を、手当たり次第に学んできました。\n\n最初は、それぞれ別物だと思っていました。\n\nでも、深く学んでいくうちに、\nふと気がついたんです。\n\n── これ、結局、同じことを\n違う言葉で言ってるだけじゃないか、と。\n\n山頂は一つで、登り道がいくつかある。\nそんなイメージでした。\n\n「自分7.0」は、\nその5つの登り道を、脳科学という共通言語で\n繋ぎ直してみた、私なりの実用知です。\n\n急がなくていい。\n今は、息を整えるところからで充分です。\nただ、その先に何があるかだけ、\n頭の片隅に置いておいてください。"}]};

// 設問（内部のサブ軸 A/B/C は採点用。ユーザーには見せない）
const QUESTIONS = [
  {ax:'A', t:'他者に何か言われた後、後になっても頭の中で何度もその場面が再生されることがあった'},
  {ax:'A', t:'自分の気持ちを、うまく言葉にできないことがあった'},
  {ax:'A', t:'仕事や日常の動作をしながら、心はずっと別のこと（過去や未来）を考えていることがあった'},
  {ax:'B', t:'強いプレッシャーを感じる場面で、心拍が上がりすぎて思考がまとまらなくなることがあった'},
  {ax:'B', t:'ネガティブな考えが浮かぶと、それが事実かどうか検証する前に飲み込まれてしまった'},
  {ax:'B', t:'「頑張らなくちゃ」「ちゃんとしなくちゃ」という声に追い立てられている感覚があった'},
  {ax:'C', t:'自分の弱さやできなさを見ると、優しくするより責めてしまうことがあった'},
  {ax:'C', t:'周囲には優しくできるのに、自分には同じ優しさを向けられない感覚があった'},
  {ax:'C', t:'過去の自分（特に苦しかった時期の自分）を思い出すと、見たくない・触れたくない感覚があった'}
];
const SCALE = ['全くない','たまにある','しばしばある','ほぼ毎日ある'];

const ATTRS = [
  {key:'count', q:'これまでの受験回数', opts:['はじめて','2回目','3回目以上']},
  {key:'age',   q:'年齢', opts:['10代','20代','30代','40代','50代','60代以上']},
  {key:'sex',   q:'性別', opts:['男性','女性','回答しない']}
];

let state = {attr:{}, order:[], idx:0, ans:[]};

/* ---------- 画面遷移 ---------- */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ---------- 属性入力 ---------- */
function renderAttr(){
  const f=document.getElementById('attrForm'); f.innerHTML='';
  ATTRS.forEach(a=>{
    const g=document.createElement('div'); g.className='grp';
    g.innerHTML='<h3>'+a.q+'</h3>';
    a.opts.forEach(o=>{
      const b=document.createElement('button'); b.className='opt'; b.textContent=o;
      b.onclick=()=>{
        state.attr[a.key]=o;
        [...g.querySelectorAll('.opt')].forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
        document.getElementById('attrNext').disabled = !(state.attr.count&&state.attr.age&&state.attr.sex);
      };
      g.appendChild(b);
    });
    f.appendChild(g);
  });
}

/* ---------- クイズ ---------- */
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function startQuiz(){
  state.order = shuffle([...Array(QUESTIONS.length).keys()]);
  state.idx=0; state.ans=new Array(QUESTIONS.length).fill(null);
  track('diag_start',{age:state.attr.age, sex:state.attr.sex, count:state.attr.count});
  go('quiz'); renderQ();
}
function renderQ(){
  const qi = state.order[state.idx];
  const q = QUESTIONS[qi];
  document.getElementById('qtext').textContent = q.t;
  document.getElementById('prog').style.width = ((state.idx)/QUESTIONS.length*100)+'%';
  document.getElementById('pcount').textContent = (state.idx+1)+' / '+QUESTIONS.length;
  const box=document.getElementById('qopts'); box.innerHTML='';
  SCALE.forEach((label,score)=>{
    const b=document.createElement('button'); b.className='opt';
    if(state.ans[qi]===score) b.classList.add('sel');
    b.innerHTML='<span class="n">'+score+'</span>'+label;
    b.onclick=()=>{ state.ans[qi]=score; next(); };
    box.appendChild(b);
  });
}
function next(){
  if(state.idx < QUESTIONS.length-1){ state.idx++; setTimeout(renderQ,180); }
  else { document.getElementById('prog').style.width='100%'; setTimeout(showResult,200); }
}

/* ---------- 採点・判定 ---------- */
function scores(){
  let a=0,b=0,c=0;
  QUESTIONS.forEach((q,i)=>{ const v=state.ans[i]||0; if(q.ax==='A')a+=v; else if(q.ax==='B')b+=v; else c+=v; });
  return {a,b,c,total:a+b+c};
}
function pct(score,max){ return Math.round((max-score)/max*100); }
function mark(score){ return score<=1?'◎':(score<=4?'○':'△'); }
function markClass(score){ return score<=1?'good':(score<=4?'mid':'low'); }

function judge(a,b,c){
  // ◎○△マーク基準で判定（バーと本文が矛盾しない設計・突出優先）
  // m: 2=◎(0〜1点/89%以上) / 1=○(2〜4点/56〜78%) / 0=△(5〜9点/44%以下)
  const m=[a,b,c].map(s=> s<=1?2 : (s<=4?1:0));
  const low =m.filter(v=>v===0).length;  // △の数
  const good=m.filter(v=>v===2).length;  // ◎の数
  // △がある＝突出あり → 総合点に関わらず個性別／全部しんどいへ（突出優先）
  if(low===3) return 2;                    // △△△ 全部しんどいさん
  if(low===2){                             // 2領域△（=突出が2つ）
    if(m[0]!==0) return 8;                 // A非△,B△,C△ → 分かってるのに動けないさん(A◎B△C△)
    if(m[1]!==0) return 7;                 // B非△,A△,C△ → 自分後回しさん(A△B◎C△)
    return 6;                              // C非△,A△,B△ → 優しき迷子さん(A△B△C◎)
  }
  if(low===1){                             // 1領域△（=単独突出）
    if(m[0]===0) return 3;                 // A△ → 自分が分からないさん
    if(m[1]===0) return 4;                 // B△ → プレッシャーに弱いさん
    return 5;                              // C△ → 自分に厳しいさん
  }
  // △なし（全軸◎または○）
  if(good===3) return 1;                   // ◎◎◎ 完了さん
  if(good===2) return 10;                  // ◎◎○ あと少しさん（○が「あと一歩」の軸）
  return 9;                                // 残り（○中心）→ ちょうどいい感じさん
}

/* ---------- 結果表示 ---------- */

      else if(d<0) diffHtml='<span class="diff down">前回比 '+d+'%</span>';

    }
    localStorage.setItem('jibun70_last',String(totalPct));

  document.getElementById('rTotalDiff').innerHTML=diffHtml;

  // メモリーバー
  setTimeout(()=>{document.getElementById('rTotalBar').style.width=totalPct+'%';},120);
  animPct('rTotalPct',totalPct);

  // サブ軸
  const axes=[['自己認識力',s.a,aP],['感情コントロール',s.b,bP],['自己受容',s.c,cP]];

  axes.forEach(([lab,sc,p])=>{

      '<div class="mini"><i style="background:'+barColor(cls)+'"></i></div>'+
      '<div class="pc">'+p+'%</div>';
    ax.appendChild(row);
    setTimeout(()=>{row.querySelector('.mini>i').style.width=p+'%';},200);
  });

  // 本文 B3 / (B4 複数回) / B5

  if(repeat){ body+='<div class="subhead">'+esc(ch.b4title)+'</div><p>'+esc(ch.b4)+'</p>'; }
  body+='<div class="subhead">'+esc(ch.b5title)+'</div><p>'+esc(ch.b5)+'</p>';
  document.getElementById('rBody').innerHTML=body;

  // 第2層
  let l2='';
  DATA.layer2.forEach(sec=>{ l2 += sec.type==='h' ? '<div class="subhead">'+esc(sec.text)+'</div>' : '<p>'+esc(sec.text)+'</p>'; });
  document.getElementById('rLayer2').innerHTML=l2;

  // 第3層
  document.getElementById('rLayer3').innerHTML=buildLayer3(num,repeat);
  drawCard();
  go('result');
}
function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function barColor(cls){ return cls==='good'?'linear-gradient(90deg,#3aa67a,#5bc79a)':cls==='mid'?'linear-gradient(90deg,#c39a36,#e0bd5c)':'linear-gradient(90deg,#b27272,#cf9494)'; }
function animPct(id,target){ const el=document.getElementById(id); let v=0; const step=Math.max(1,Math.round(target/30));
  const t=setInterval(()=>{ v+=step; if(v>=target){v=target;clearInterval(t);} el.textContent=v; },22); }

/* ---------- 第3層（クロージング＋シェア） ---------- */
function buildLayer3(num,repeat){
  let h='';
  if(repeat){
    h+='<div class="cta-block" style="background:#f0edff;border-color:#ddd9f0">'+
       '<h4>続けてくださって、ありがとうございます。</h4>'+
       '<p>診断を続けていただいているということは、何かしら、自分のことを大切にしようとしている時期なのだと思います。\nその流れの中で、次に何があれば役に立ちそうか、いくつかの選択肢をご用意しています。</p></div>';
  }
  if(num===2){
    h+='<div class="note" style="margin-bottom:14px">今は、無理のない範囲で、できることだけで大丈夫です。</div>';
  }
  // LINE
  let lineP='あなたの状態に合うワークと、自分7.0の考え方の核心を、数日かけてお届けします。\n\n「なぜ脳科学でスピリチュアルを語れるのか」\n「2,500年前の密教が現代科学で裏付けられる理由」\n「整えた先に、何が待っているのか」';
  if(num===1) lineP+='\n\n次のステップ（5次元の体感など）について、準備が整い次第、LINEでお知らせします。';
  h+='<div class="cta-block"><span class="tag">無料</span><h4>LINEで受け取る</h4>'+
     '<p>'+esc(lineP)+'</p>'+
     '<button class="btn line" onclick="openLink(CONFIG.LINE_URL,\'line\')">LINEに登録する</button></div>';
  // フロント
  let frontP='noteで読み進める8週間のアップデート設計。\n\n心理学・哲学・自己啓発・スピリチュアル・宗教 ── 5つの登り道を、脳科学を共通言語に再設計した8週間のプログラム。\n\n毎週、AIプロンプトを使った対話ワークと読み物で、自分の内側を整えていきます。\n\nWeek 4とWeek 8で診断テストを再受験。アップデート%の変化を、目で確認できます。';
  if(num===1) frontP='もう4次元思考は獲得されている方ですが、整理・体系化の意味で読み物として楽しんでいただけます。Week 8の最終診断で、ご自身の状態を再確認することもできます。';
  if(num===10) frontP='あと少しで完了です。フロントプログラムで、最後の仕上げをしませんか。\n\n'+frontP;
  if(num===2) frontP='もし、何か始めてみたい気持ちが少しでもあれば、8週間のプログラムもあります。でも、まずはLINEで様子を見るだけでも充分です。';
  h+='<div class="cta-block"><span class="tag">¥12,000 ／ 8週間</span><h4>自分7.0 フロントプログラム</h4>'+
     '<p>'+esc(frontP)+'</p>'+
     '<button class="btn ghost" onclick="openLink(CONFIG.FRONT_URL,\'front\')">詳細を見る</button></div>';
  h+='<div class="note" style="margin:0 0 14px">※今後、より深い体感的なプログラム（3ヶ月の伴走プログラムなど）も追加していく予定です。準備が整いましたら、LINEでお知らせいたします。</div>';
  // SNS
  h+='<div class="cta-block"><h4>まずは、ゆるく繋がる</h4>'+
     '<p>X / YouTubeで日々発信しています。</p>'+
     '<div class="share-row"><button class="btn ghost" onclick="openLink(CONFIG.X_URL,\'x\')">X</button>'+
     '<button class="btn ghost" onclick="openLink(CONFIG.YT_URL,\'yt\')">YouTube</button></div></div>';
  // シェア（キモ）
  h+='<div class="cta-block" style="background:#fbfaff;border-color:#ddd9f0">'+
     '<span class="tag">SHARE</span><h4>結果をシェアする</h4>'+
     '<p>この診断、誰かに合いそうだなと思った方がいたら、シェアしてみてください。\n\n※あなたのキャラ名とアップデート%が一緒に表示されます。ご安心ください、設問の回答内容は出ません。</p>'+
     '<canvas id="cardCanvas" width="1080" height="1350"></canvas>'+
     '<button class="btn" onclick="saveCard()" style="margin-bottom:10px">① 結果画像を保存</button>'+
     '<div class="share-row">'+
     '<button class="btn x" onclick="shareX()">② Xでシェア</button>'+
     '<button class="btn line" onclick="shareLine()">LINEで送る</button>'+
     '<button class="btn ghost" onclick="copyUrl()">URLをコピー</button>'+
     '</div>'+
     '<div class="note" style="margin-top:12px">投稿のコツ：まず「①画像を保存」→「②Xでシェア」を押し、投稿画面で保存した画像を添付すると、結果カードつきで広がります。</div></div>';
  h+='<div class="closing">何も選ばずに閉じても大丈夫です。\n今日、自分の状態を確認できたこと自体が、一つの大切な変化です。</div>';
  return h;
}
function openLink(u,label){ if(!u||u.indexOf('xxxxxxx')>=0){ toast('公開後にURLを設定してください'); return;} track('cta_click',{cta:label||'link', character:LAST?LAST.ch.name:'', pct:LAST?LAST.totalPct:null}); window.open(u,'_blank'); }

/* ---------- シェア画像（Canvas） ---------- */
function drawCard(){
  const c=document.getElementById('cardCanvas'); if(!c) return;
  const x=c.getContext('2d'); const W=1080,H=1350;
  // 背景
  const g=x.createLinearGradient(0,0,W,H); g.addColorStop(0,'#23233a'); g.addColorStop(1,'#15151f');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  // 飾り光
  const rg=x.createRadialGradient(W*0.8,180,40,W*0.8,180,520); rg.addColorStop(0,'rgba(107,91,214,.45)'); rg.addColorStop(1,'rgba(107,91,214,0)');
  x.fillStyle=rg; x.fillRect(0,0,W,H);
  const F='-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif';
  x.textAlign='center';
  // ブランド
  x.fillStyle='rgba(255,255,255,.65)'; x.font='600 30px '+F;
  x.fillText('自分7.0  アップデート診断', W/2, 120);
  // あなたは
  x.fillStyle='rgba(255,255,255,.55)'; x.font='400 34px '+F;
  x.fillText('あなたは', W/2, 245);
  // キャラ名（折り返し対応）
  x.font='800 62px '+F;
  const grad=x.createLinearGradient(W*0.2,0,W*0.8,0); grad.addColorStop(0,'#9b8cff'); grad.addColorStop(1,'#5fd2dd');
  x.fillStyle=grad;
  const name='「'+LAST.ch.name+'」';
  wrapText(x,name,W/2,330,920,72);
  // サブキャッチ
  let yy = LAST.ch.name.length>12 ? 470 : 410;
  x.fillStyle='rgba(255,255,255,.92)'; x.font='600 38px '+F;
  x.fillText(LAST.ch.sub, W/2, yy);
  // 大きな%
  yy += 130;
  x.fillStyle='#ffffff'; x.font='800 150px '+F;
  x.fillText(LAST.totalPct+'', W/2-30, yy);
  x.font='800 56px '+F; x.fillStyle='rgba(255,255,255,.7)';
  x.fillText('%', W/2 + nameWidthHalf(x,LAST.totalPct+'',150)/1 + 40, yy);
  x.font='500 30px '+F; x.fillStyle='rgba(255,255,255,.6)';
  x.fillText('アップデート状況', W/2, yy+52);
  // 総合バー
  yy += 110;
  drawBar(x, 140, yy, W-280, 30, LAST.totalPct/100, '#6b5bd6', '#39b9c7');
  // サブ軸3行
  yy += 90;
  const rows=[['自己認識力',LAST.aP,LAST.s.a],['感情コントロール',LAST.bP,LAST.s.b],['自己受容',LAST.cP,LAST.s.c]];
  x.textAlign='left';
  rows.forEach(([lab,p,sc])=>{
    x.fillStyle='rgba(255,255,255,.9)'; x.font='600 34px '+F;
    x.fillText(lab, 150, yy+8);
    const mk = sc<=1?'◎':(sc<=4?'○':'△');
    const mc = sc<=1?'#5bc79a':(sc<=4?'#e0bd5c':'#cf9494');
    x.fillStyle=mc; x.font='800 40px '+F; x.fillText(mk, 560, yy+10);
    drawBar(x, 630, yy-22, 300, 22, p/100, '#6b5bd6', '#39b9c7');
    x.fillStyle='rgba(255,255,255,.9)'; x.font='700 34px '+F; x.textAlign='right';
    x.fillText(p+'%', W-150, yy+8); x.textAlign='left';
    yy += 78;
  });
  // フッター
  x.textAlign='center';
  x.strokeStyle='rgba(255,255,255,.15)'; x.beginPath(); x.moveTo(140,yy+20); x.lineTo(W-140,yy+20); x.stroke();
  x.fillStyle='#ffffff'; x.font='700 40px '+F;
  x.fillText('▷ あなたも無料で診断する', W/2, yy+95);
  x.fillStyle='rgba(255,255,255,.6)'; x.font='500 30px '+F;
  x.fillText(CONFIG.TEST_URL.replace(/^https?:\/\//,''), W/2, yy+150);
  c.style.display='block';
}
function nameWidthHalf(x,t,size){ x.save(); x.font='800 '+size+'px sans-serif'; const w=x.measureText(t).width; x.restore(); return w/2; }
function drawBar(x,bx,by,bw,bh,ratio,c1,c2){
  x.fillStyle='rgba(255,255,255,.12)'; roundRect(x,bx,by,bw,bh,bh/2); x.fill();
  const g=x.createLinearGradient(bx,0,bx+bw,0); g.addColorStop(0,c1); g.addColorStop(1,c2);
  x.fillStyle=g; roundRect(x,bx,by,Math.max(bh,bw*ratio),bh,bh/2); x.fill();
}
function roundRect(x,a,b,w,h,r){ x.beginPath(); x.moveTo(a+r,b); x.arcTo(a+w,b,a+w,b+h,r); x.arcTo(a+w,b+h,a,b+h,r); x.arcTo(a,b+h,a,b,r); x.arcTo(a,b,a+w,b,r); x.closePath(); }
function wrapText(x,text,cx,cy,maxW,lh){
  if(x.measureText(text).width<=maxW){ x.fillText(text,cx,cy); return; }
  // 折り返し（句点・読点優先、なければ中央）
  let mid=Math.ceil(text.length/2);
  const l1=text.slice(0,mid), l2=text.slice(mid);
  x.fillText(l1,cx,cy-lh/2+6); x.fillText(l2,cx,cy+lh/2+6);
}
function saveCard(){
  const c=document.getElementById('cardCanvas');
  c.toBlob(b=>{ const u=URL.createObjectURL(b); const a=document.createElement('a');
    a.href=u; a.download='自分7.0_診断結果.png'; a.click(); URL.revokeObjectURL(u);
    track('share_action',{method:'save_card', character:LAST?LAST.ch.name:''});
    toast('画像を保存しました'); });
}
function shareText(){ return '私は「'+LAST.ch.name+'」でした。\n自分7.0アップデート状況は '+LAST.totalPct+'%。\nあなたはどのタイプ？ #自分7_0 #4次元アップデート'; }
function shareUrl(){ return CONFIG.TEST_URL + (CONFIG.TEST_URL.indexOf('?')>=0?'&':'?') + 'src=share'; }
function shareX(){
  track('share_action',{method:'x', character:LAST?LAST.ch.name:''});
  const u='https://twitter.com/intent/tweet?text='+encodeURIComponent(shareText())+'&url='+encodeURIComponent(shareUrl());
  window.open(u,'_blank');
}
function shareLine(){
  track('share_action',{method:'line', character:LAST?LAST.ch.name:''});
  const u='https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(shareUrl())+'&text='+encodeURIComponent(shareText());
  window.open(u,'_blank');
}
function copyUrl(){
  track('share_action',{method:'copy', character:LAST?LAST.ch.name:''});
  navigator.clipboard.writeText(shareUrl()).then(()=>toast('URLをコピーしました')).catch(()=>toast('コピーできませんでした'));
}
function restart(){ state={attr:{},order:[],idx:0,ans:[]}; renderAttr(); document.getElementById('attrNext').disabled=true; go('intro'); }

renderAttr();
</script>
